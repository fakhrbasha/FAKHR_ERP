tags:
  - name: Department
    description: Manage departments

paths:
  /department:
    post:
      tags: [Department]
      summary: Create a new department
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepartmentBody'
      responses:
        '201':
          description: Department created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Validation error
        '401':
          description: Unauthorized

    get:
      tags: [Department]
      summary: Get all departments
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of departments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Unauthorized

  /department/{id}:
    get:
      tags: [Department]
      summary: Get department by ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "664f1c2e3a1b2c3d4e5f6a7b"
      responses:
        '200':
          description: Department details
        '404':
          description: Department not found
        '401':
          description: Unauthorized

    put:
      tags: [Department]
      summary: Update a department
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "664f1c2e3a1b2c3d4e5f6a7b"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepartmentBody'
      responses:
        '200':
          description: Department updated successfully
        '404':
          description: Department not found
        '401':
          description: Unauthorized

    delete:
      tags: [Department]
      summary: Delete a department
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "664f1c2e3a1b2c3d4e5f6a7b"
      responses:
        '200':
          description: Department deleted successfully
        '404':
          description: Department not found
        '401':
          description: Unauthorized
