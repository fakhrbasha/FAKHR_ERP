tags:
  - name: Employee
    description: Manage employees

paths:
  /employee/create-employee/{departmentId}:
    post:
      tags: [Employee]
      summary: Create an employee in a department
      security:
        - BearerAuth: []
      parameters:
        - name: departmentId
          in: path
          required: true
          description: MongoDB ObjectId of the department
          schema:
            type: string
            example: "664f1c2e3a1b2c3d4e5f6a7b"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEmployeeBody'
      responses:
        '201':
          description: Employee created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Validation error
        '401':
          description: Unauthorized

  /employee:
    get:
      tags: [Employee]
      summary: Get all employees
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
            example: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 10
            example: 10
        - name: search
          in: query
          required: false
          description: Case-insensitive employee search term
          schema:
            type: string
            example: "Ahmed"
      responses:
        '200':
          description: List of all employees
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Unauthorized

  /employee/{id}:
    get:
      tags: [Employee]
      summary: Get employee by ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "664f1c2e3a1b2c3d4e5f6a7b"
      responses:
        '200':
          description: Employee details
        '404':
          description: Employee not found
        '401':
          description: Unauthorized

    put:
      tags: [Employee]
      summary: Update an employee
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "664f1c2e3a1b2c3d4e5f6a7b"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEmployeeBody'
      responses:
        '200':
          description: Employee updated successfully
        '404':
          description: Employee not found
        '401':
          description: Unauthorized

    delete:
      tags: [Employee]
      summary: Delete an employee
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "664f1c2e3a1b2c3d4e5f6a7b"
      responses:
        '200':
          description: Employee deleted successfully
        '404':
          description: Employee not found
        '401':
          description: Unauthorized
