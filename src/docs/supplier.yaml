tags:
  - name: Supplier
    description: Manage suppliers

paths:
  /suppliers:
    post:
      tags: [Supplier]
      summary: Add a new supplier
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSupplierBody'
      responses:
        '201':
          description: Supplier added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Validation error
        '401':
          description: Unauthorized

  /suppliers:
    get:
      tags: [Supplier]
      summary: Get all suppliers
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of all suppliers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Unauthorized

  /suppliers/{id}:
    get:
      tags: [Supplier]
      summary: Get supplier by ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "664f1c2e3a1b2c3d4e5f6a7b"
      responses:
        '200':
          description: Supplier details
        '404':
          description: Supplier not found
        '401':
          description: Unauthorized

  /suppliers/{id}:
    put:
      tags: [Supplier]
      summary: Update a supplier
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "664f1c2e3a1b2c3d4e5f6a7b"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSupplierBody'
      responses:
        '200':
          description: Supplier updated successfully
        '404':
          description: Supplier not found
        '401':
          description: Unauthorized

  /suppliers/{id}:
    delete:
      tags: [Supplier]
      summary: Delete a supplier
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "664f1c2e3a1b2c3d4e5f6a7b"
      responses:
        '200':
          description: Supplier deleted successfully
        '404':
          description: Supplier not found
        '401':
          description: Unauthorized
