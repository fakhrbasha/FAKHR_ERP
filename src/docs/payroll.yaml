tags:
  - name: Payroll
    description: Employee payroll & payment management endpoints

paths:
  /employee/employee-payment:
    post:
      tags: [Payroll]
      summary: Create a payment record for an employee
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePayrollBody'
      responses:
        '201':
          description: Payment created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Validation error or amount <= 0
        '404':
          description: Employee not found
        '401':
          description: Unauthorized

  /employee/employee-payment/{employeeId}/summary:
    get:
      tags: [Payroll]
      summary: Get payment summary for an employee
      description: Returns total paid, expected salary, weeks worked, and balance
      security:
        - BearerAuth: []
      parameters:
        - name: employeeId
          in: path
          required: true
          description: MongoDB ObjectId of the employee
          schema:
            type: string
            example: "664f1c2e3a1b2c3d4e5f6a7b"
      responses:
        '200':
          description: Employee payment summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Invalid employee ID
        '404':
          description: Employee not found
        '401':
          description: Unauthorized

  /employee/employee-payment/{employeeId}/payrolls:
    get:
      tags: [Payroll]
      summary: Get all payroll records for an employee (paginated)
      security:
        - BearerAuth: []
      parameters:
        - name: employeeId
          in: path
          required: true
          description: MongoDB ObjectId of the employee
          schema:
            type: string
            example: "664f1c2e3a1b2c3d4e5f6a7b"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
            example: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 10
            example: 10
      responses:
        '200':
          description: Paginated list of payroll records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          description: Employee not found
        '401':
          description: Unauthorized
