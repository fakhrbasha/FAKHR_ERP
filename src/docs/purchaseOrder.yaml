tags:
  - name: Purchase Orders
    description: Manage purchase orders from suppliers

paths:
  /purchase-order:
    post:
      tags: [Purchase Orders]
      summary: Create a new purchase order
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePurchaseOrderBody'
      responses:
        '201':
          description: Purchase order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Validation error (e.g. empty items, invalid quantity/price)
        '401':
          description: Unauthorized
        '404':
          description: Supplier, material, or color not found

  /purchase-order:
    get:
      tags: [Purchase Orders]
      summary: Get all purchase orders (paginated)
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            example: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            example: 10
      responses:
        '200':
          description: List of purchase orders retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Unauthorized
        '404':
          description: No purchase orders found

  /purchase-order/{id}:
    get:
      tags: [Purchase Orders]
      summary: Get a purchase order by ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "664f1c2e3a1b2c3d4e5f6a7b"
      responses:
        '200':
          description: Purchase order details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Unauthorized
        '404':
          description: Order not found

  /purchase-order/{id}/approve:
    patch:
      tags: [Purchase Orders]
      summary: Approve a pending purchase order
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "664f1c2e3a1b2c3d4e5f6a7b"
      responses:
        '200':
          description: Purchase order approved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Order is already approved or has been cancelled
        '401':
          description: Unauthorized
        '404':
          description: Order not found

  /purchase-order/{id}/cancel:
    patch:
      tags: [Purchase Orders]
      summary: Cancel a purchase order
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "664f1c2e3a1b2c3d4e5f6a7b"
      responses:
        '200':
          description: Purchase order cancelled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Cannot cancel a received order
        '401':
          description: Unauthorized
        '404':
          description: Order not found

  /purchase-order/{id}/receive:
    patch:
      tags: [Purchase Orders]
      summary: Mark an approved purchase order as received (updates stock)
      description: |
        Marks the order as received. For each item in the order, the system
        automatically updates or creates a yarn stock entry and logs a stock-IN
        transaction referencing this order.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "664f1c2e3a1b2c3d4e5f6a7b"
      responses:
        '200':
          description: Purchase order received and stock updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Order must be approved before it can be received
        '401':
          description: Unauthorized
        '404':
          description: Order not found
