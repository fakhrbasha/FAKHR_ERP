tags:
  - name: Attendance
    description: Employee attendance check-in and check-out

paths:
  /attendance:
    get:
      tags: [Attendance]
      summary: Get all attendance records
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of attendance records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Unauthorized

  /attendance/check-in/{employeeId}:
    post:
      tags: [Attendance]
      summary: Check in an employee
      security:
        - BearerAuth: []
      parameters:
        - name: employeeId
          in: path
          required: true
          description: MongoDB ObjectId of the employee
          schema:
            type: string
            example: "664f1c2e3a1b2c3d4e5f6a7b"
      responses:
        '200':
          description: Check-in recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          description: Employee not found
        '401':
          description: Unauthorized

  /attendance/check-out/{employeeId}:
    post:
      tags: [Attendance]
      summary: Check out an employee
      security:
        - BearerAuth: []
      parameters:
        - name: employeeId
          in: path
          required: true
          description: MongoDB ObjectId of the employee
          schema:
            type: string
            example: "664f1c2e3a1b2c3d4e5f6a7b"
      responses:
        '200':
          description: Check-out recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          description: Employee not found
        '401':
          description: Unauthorized
