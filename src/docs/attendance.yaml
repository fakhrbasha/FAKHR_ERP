tags:
  - name: Attendance
    description: Employee attendance management

paths:
  /attendance:
    get:
      tags: [Attendance]
      summary: Get all attendance records (paginated)
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
            example: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 10
            example: 10
        - name: search
          in: query
          required: false
          description: Filter by status (e.g. present, absent, late)
          schema:
            type: string
            example: "present"
      responses:
        '200':
          description: Paginated list of attendance records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Unauthorized

  /attendance/{employeeId}:
    post:
      tags: [Attendance]
      summary: Create an attendance record for an employee
      security:
        - BearerAuth: []
      parameters:
        - name: employeeId
          in: path
          required: true
          description: MongoDB ObjectId of the employee
          schema:
            type: string
            example: "664f1c2e3a1b2c3d4e5f6a7b"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAttendanceBody'
      responses:
        '201':
          description: Attendance record created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Validation error or shift not assigned
        '404':
          description: Employee not found
        '401':
          description: Unauthorized

  /attendance/record/{id}:
    get:
      tags: [Attendance]
      summary: Get a single attendance record by ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: MongoDB ObjectId of the attendance record
          schema:
            type: string
            example: "664f1c2e3a1b2c3d4e5f6a7b"
      responses:
        '200':
          description: Attendance record details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          description: Attendance record not found
        '401':
          description: Unauthorized
