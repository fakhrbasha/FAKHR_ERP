tags:
  - name: Auth
    description: Authentication & authorization endpoints

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterBody'
      responses:
        '201':
          description: User registered. OTP sent to email.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/confirm-email:
    post:
      tags: [Auth]
      summary: Confirm email with OTP
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmEmailBody'
      responses:
        '200':
          description: Email confirmed successfully
        '400':
          description: Invalid or expired OTP

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginBody'
      responses:
        '200':
          description: Login successful, returns JWT tokens
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: "Login successful" }
                  accessToken: { type: string }
                  refreshToken: { type: string }
        '401':
          description: Invalid credentials

  /auth/resend-otp:
    post:
      tags: [Auth]
      summary: Resend email confirmation OTP
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailOnlyBody'
      responses:
        '200':
          description: OTP resent successfully
        '404':
          description: User not found

  /auth/forget-password:
    post:
      tags: [Auth]
      summary: Request password reset OTP
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailOnlyBody'
      responses:
        '200':
          description: Password reset OTP sent
        '404':
          description: User not found

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password using OTP
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordBody'
      responses:
        '200':
          description: Password reset successful
        '400':
          description: Invalid OTP

  /auth/update-password:
    post:
      tags: [Auth]
      summary: Update password (authenticated)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePasswordBody'
      responses:
        '200':
          description: Password updated successfully
        '401':
          description: Unauthorized

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout and invalidate session
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logged out successfully
        '401':
          description: Unauthorized

  /auth/profile:
    get:
      tags: [Auth]
      summary: Get the authenticated user's profile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Profile fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Unauthorized

  /auth/users:
    get:
      tags: [Auth]
      summary: Get all users (Admin only)
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            example: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            example: 10
      responses:
        '200':
          description: Users fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (Admin only)

    post:
      tags: [Auth]
      summary: Create a new user (Admin only)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserBody'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (Admin only)

  /auth/users/{id}:
    delete:
      tags: [Auth]
      summary: Delete a user by ID (Admin only)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The user ID
      responses:
        '200':
          description: User deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (Admin only)
        '404':
          description: User not found

  /auth/users/{id}/role:
    post:
      tags: [Auth]
      summary: Update a user's role (Admin only)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The user ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleBody'
      responses:
        '200':
          description: Role updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (Admin only)
        '404':
          description: User not found
