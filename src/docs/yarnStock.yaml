tags:
  - name: Yarn Stock
    description: Manage yarn stock inventory

paths:
  /yarn-stock/create:
    post:
      tags: [Yarn Stock]
      summary: Create a new yarn stock entry
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddYarnStockBody'
      responses:
        '201':
          description: Yarn stock created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Validation error
        '401':
          description: Unauthorized

  /yarn-stock:
    get:
      tags: [Yarn Stock]
      summary: Get all yarn stock entries
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of all yarn stock entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Unauthorized

  /yarn-stock/{id}:
    get:
      tags: [Yarn Stock]
      summary: Get yarn stock by ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "664f1c2e3a1b2c3d4e5f6a7b"
      responses:
        '200':
          description: Yarn stock details
        '404':
          description: Yarn stock not found
        '401':
          description: Unauthorized
    delete:
      tags: [Yarn Stock]
      summary: Delete a yarn stock entry
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "664f1c2e3a1b2c3d4e5f6a7b"
      responses:
        '200':
          description: Yarn stock deleted successfully
        '404':
          description: Yarn stock not found
        '401':
          description: Unauthorized

  /yarn-stock/transaction/{stockId}:
    get:
      tags: [Yarn Stock]
      summary: Get all transactions for a stock item
      security:
        - BearerAuth: []
      parameters:
        - name: stockId
          in: path
          required: true
          schema:
            type: string
            example: "664f1c2e3a1b2c3d4e5f6a7b"
      responses:
        '200':
          description: List of stock transactions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Unauthorized

  /yarn-stock/transaction/{stockId}/in:
    post:
      tags: [Yarn Stock]
      summary: Add quantity to stock (stock IN)
      security:
        - BearerAuth: []
      parameters:
        - name: stockId
          in: path
          required: true
          schema:
            type: string
            example: "664f1c2e3a1b2c3d4e5f6a7b"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StockInOutBody'
      responses:
        '200':
          description: Stock increased successfully
        '400':
          description: Validation error
        '401':
          description: Unauthorized

  /yarn-stock/transaction/{stockId}/out:
    post:
      tags: [Yarn Stock]
      summary: Remove quantity from stock (stock OUT)
      security:
        - BearerAuth: []
      parameters:
        - name: stockId
          in: path
          required: true
          schema:
            type: string
            example: "664f1c2e3a1b2c3d4e5f6a7b"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StockInOutBody'
      responses:
        '200':
          description: Stock decreased successfully
        '400':
          description: Validation error
        '401':
          description: Unauthorized

  /yarn-stock/transaction/{stockId}/history:
    get:
      tags: [Yarn Stock]
      summary: Get transaction history for a stock item
      security:
        - BearerAuth: []
      parameters:
        - name: stockId
          in: path
          required: true
          schema:
            type: string
            example: "664f1c2e3a1b2c3d4e5f6a7b"
      responses:
        '200':
          description: Transaction history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Unauthorized
