tags:
  - name: Material
    description: Manage raw materials

paths:
  /material:
    post:
      tags: [Material]
      summary: Add a new material
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddMaterialBody'
      responses:
        '201':
          description: Material added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Validation error
        '401':
          description: Unauthorized

  /material:
    get:
      tags: [Material]
      summary: Get all materials
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of all materials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Unauthorized

  /material/{id}:
    get:
      tags: [Material]
      summary: Get material by ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "664f1c2e3a1b2c3d4e5f6a7b"
      responses:
        '200':
          description: Material details
        '404':
          description: Material not found
        '401':
          description: Unauthorized

  /material/{id}:
    put:
      tags: [Material]
      summary: Update a material
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "664f1c2e3a1b2c3d4e5f6a7b"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMaterialBody'
      responses:
        '200':
          description: Material updated successfully
        '404':
          description: Material not found
        '401':
          description: Unauthorized

  /material/{id}:
    delete:
      tags: [Material]
      summary: Delete a material
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "664f1c2e3a1b2c3d4e5f6a7b"
      responses:
        '200':
          description: Material deleted successfully
        '404':
          description: Material not found
        '401':
          description: Unauthorized
